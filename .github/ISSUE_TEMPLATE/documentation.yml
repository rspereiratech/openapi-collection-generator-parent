name: Documentation
description: Report missing, unclear, or incorrect documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: dropdown
    id: location
    attributes:
      label: Where is the issue?
      options:
        - README.md
        - CONTRIBUTING.md
        - SECURITY.md
        - CODE_OF_CONDUCT.md
        - Configuration reference
        - Javadoc / inline code docs
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What's wrong or missing?
      description: Describe the issue and, if possible, suggest an improvement.
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: Link or file path (optional)
      placeholder: "README.md#configuration-reference"
    validations:
      required: false
