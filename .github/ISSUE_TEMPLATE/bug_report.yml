name: Bug Report
description: Report a defect in the parent POM (dependency management, properties, build configuration)
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        This repository hosts the **parent POM only**. For bugs in the runtime modules (`core`, `postman`, `insomnia`, `maven-plugin`), please open the issue on their respective repositories.

  - type: input
    id: parent-version
    attributes:
      label: Parent POM version
      description: Version of `openapi-collection-generator-parent` you consumed.
      placeholder: "1.0.0-SNAPSHOT"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the parent POM is misbehaving?
      options:
        - dependencyManagement (managed version)
        - properties (Java / Maven / dependency version property)
        - Build plugins / lifecycle
        - Project metadata (groupId, version, name)
        - Repository files (.github, README, etc.)
        - Unsure
    validations:
      required: true

  - type: input
    id: maven-version
    attributes:
      label: Maven version
      description: Output of `mvn -v`.
      placeholder: "3.9.6"
    validations:
      required: true

  - type: input
    id: java-version
    attributes:
      label: Java version
      description: Output of `java -version`.
      placeholder: "17.0.10 (Temurin)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: consumer-pom
    attributes:
      label: Consumer POM snippet
      description: The relevant section of the POM that inherits from / imports this parent (redact anything sensitive).
      render: xml
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command executed
      description: The exact Maven command that triggers the issue.
      placeholder: "mvn clean install"
      render: shell
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant output, ideally with `-X` (debug) or `-e` (errors) Maven flags. Consider attaching `mvn help:effective-pom`.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Anything else that might help — workarounds tried, hypotheses, links.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This bug concerns the parent POM, not a downstream module (which has its own repo).
          required: true
        - label: I am using a supported Java (17+) and Maven (3.9+) version.
          required: true
