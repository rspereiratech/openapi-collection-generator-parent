name: Feature Request
description: Suggest a change to the parent POM (dependency management, properties, build config, metadata)
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        This repository hosts the **parent POM only**. Feature requests for the runtime modules (`core`, `postman`, `insomnia`, `maven-plugin`) belong on their respective repositories.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which part of the parent POM would this affect?
      options:
        - Add / bump managed dependency version (dependencyManagement)
        - Add / change a property (Java / Maven / dependency version)
        - Add / configure a build plugin
        - Project metadata (groupId, name, description, scm, distributionManagement)
        - Repository files (README, CONTRIBUTING, .github/, etc.)
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? What's the use case for the child modules that consume this parent?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Concrete change to the parent POM. Include an XML snippet if possible.
      render: xml
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why this one is preferred.
    validations:
      required: false

  - type: dropdown
    id: breaking
    attributes:
      label: Impact on child modules
      description: Would this require child modules to change?
      options:
        - "No — purely additive"
        - "Children should pick it up transparently on next version bump"
        - "Children must update configuration"
        - "Breaking — children won't build until they migrate"
        - "Unsure"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request implementing this change.
          required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This request concerns the parent POM, not a downstream module.
          required: true
