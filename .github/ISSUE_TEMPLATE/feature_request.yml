name: Feature Request
description: Suggest a new feature, output format, or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the use case so we can evaluate the proposal.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which module would this affect?
      options:
        - New output format (new module, e.g. Bruno, HTTPie)
        - openapi-collection-generator-maven-plugin (new goal / parameter)
        - openapi-collection-generator-core (orchestration / parsing)
        - openapi-collection-generator-postman
        - openapi-collection-generator-insomnia
        - Build / parent POM
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? What's the use case?
      placeholder: "Currently the plugin does X, but in scenario Y I need it to do Z because..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should this work? Include configuration examples if applicable.
      render: xml
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why this one is preferred.
    validations:
      required: false

  - type: textarea
    id: openapi-example
    attributes:
      label: Example OpenAPI spec (optional)
      description: An OpenAPI snippet that illustrates the feature.
      render: yaml
    validations:
      required: false

  - type: dropdown
    id: breaking
    attributes:
      label: Backwards compatibility
      description: Would this change break existing users?
      options:
        - "No — purely additive"
        - "Possibly — new default behavior"
        - "Yes — breaking change"
        - "Unsure"
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request implementing this feature.
          required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
